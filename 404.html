<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — RF Chain Calculator</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f1117;
            color: #e4e7f1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .container { max-width: 480px; padding: 2rem; }
        .icon { font-size: 4rem; margin-bottom: 1rem; }
        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ef4444, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        p { color: #8b8fa3; margin: 1rem 0 2rem; font-size: 1.05rem; line-height: 1.6; }
        a {
            display: inline-block;
            padding: 0.7rem 1.8rem;
            background: linear-gradient(135deg, #4a7dff, #06b6d4);
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        a:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>404</h1>
        <p>Signal lost — this page is out of range.<br>The link budget doesn't add up here.</p>
        <a href="/">← Back to RF Calculator</a>
    </div>
</body>
</html>
