  <circle cx="256" cy="280" r="140" fill="none" stroke="url(#g1)" stroke-width="3" opacity="0.3"/>
  <circle cx="256" cy="280" r="100" fill="none" stroke="url(#g1)" stroke-width="2.5" opacity="0.4"/>
